<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📊 Smart Attendance Dashboard</h1>

<div class="dashboard">
    <div>Total Students: <span id="totalStudents">0</span></div>
    <div>Total Classes: <span id="totalClasses">0</span></div>
</div>

<div class="container">

    <h2>Add Student</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="text" id="roll" placeholder="Roll No">
    <button onclick="addStudent()">Add</button>

    <h2>Search</h2>
    <input type="text" id="search" placeholder="Search..." onkeyup="searchStudent()">

    <h2>Student List</h2>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll</th>
                <th>Attendance</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

</div>

<script src="script.js"></script>
</body>
</html>
